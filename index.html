<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle da Loja</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow">
<div class="container">
<a class="navbar-brand fw-bold">Loja de Celulares</a>
</div>
</nav>

<div class="container mt-4">

<h3 class="text-center mb-3">Cadastrar Produto</h3>

<div class="card shadow p-3">

<form id="formProduto">

<input type="text" id="nome" class="form-control mb-2" placeholder="Nome do produto" required>

<input type="number" id="preco" class="form-control mb-2" placeholder="Preço">

<input type="number" id="quantidade" class="form-control mb-2" placeholder="Quantidade">

<select id="categoria" class="form-select mb-3">

<option>Celulares</option>
<option>Capas</option>
<option>Carregadores</option>
<option>Fones de ouvido</option>
<option>Películas</option>
<option>Cabos USB</option>
<option>Outros acessórios</option>

</select>

<button class="btn btn-primary w-100">
<i class="bi bi-plus-circle"></i> Salvar Produto
</button>

</form>

</div>

<hr>

<h3 class="mt-3">Produtos</h3>

<div class="table-responsive">

<table class="table table-striped">

<thead class="table-dark">

<tr>
<th>Produto</th>
<th>Preço</th>
<th>Qtd</th>
<th>Categoria</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="tabelaProdutos"></tbody>

</table>

</div>

</div>

<script src="script.js"></script>

</body>
</html>

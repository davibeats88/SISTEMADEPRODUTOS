<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Produtos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow">
<div class="container">
<a class="navbar-brand fw-bold">Sistema de Produtos</a>
</div>
</nav>

<div class="container mt-5">

<h2 class="text-center mb-4">Cadastro de Produtos</h2>

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow p-4">

<form id="formProduto">

<div class="mb-3">
<label>Nome</label>
<input type="text" id="nome" class="form-control" required>
</div>

<div class="mb-3">
<label>Preço</label>
<input type="number" id="preco" class="form-control" required>
</div>

<div class="mb-3">
<label>Quantidade</label>
<input type="number" id="quantidade" class="form-control" required>
</div>

<div class="mb-3">
<label>Categoria</label>
<select id="categoria" class="form-select">
<option>Eletrônicos</option>
<option>Alimentos</option>
<option>Roupas</option>
<option>Outros</option>
</select>
</div>

<div class="d-grid">
<button class="btn btn-primary btn-lg">
<i class="bi bi-plus-circle"></i> Salvar Produto
</button>
</div>

</form>

</div>

</div>
</div>

<hr class="mt-5">

<div class="row mb-3">

<div class="col-md-6">
<input type="text" id="pesquisa" class="form-control" placeholder="🔎 Pesquisar produto...">
</div>

<div class="col-md-6 text-end">
<h5>Total de produtos: <span id="contador">0</span></h5>
</div>

</div>

<div class="table-responsive">

<table class="table table-striped table-hover">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Nome</th>
<th>Preço</th>
<th>Quantidade</th>
<th>Categoria</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabelaProdutos"></tbody>

</table>

</div>

</div>

<button class="botao-flutuante">
<i class="bi bi-arrow-up"></i>
</button>

<script src="script.js"></script>

</body>
</html>
